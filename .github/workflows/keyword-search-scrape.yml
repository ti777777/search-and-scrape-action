name: Keyword Search & Scrape (example caller)

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "要搜尋的關鍵字"
        required: true
        type: string

jobs:
  search-and-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 同 repo 用相對路徑 `./`；跨 repo 用 `uses: ti777777/search-and-scrape-action@main`
      # （action.yml 放在 repo 根目錄，所以不用寫 .github/actions/... 那串路徑）。
      - name: Search & scrape top 3 results
        id: search
        uses: ./
        with:
          keyword: ${{ inputs.keyword }}
          result-count: 3

      # --- 下一個 step 直接消費 action 的 output ---
      - name: Use results in next step
        run: |
          echo "results-dir output: ${{ steps.search.outputs.results-dir }}"
          echo "results-json output: ${{ steps.search.outputs.results-json }}"
          echo "Files written to \$GITHUB_WORKSPACE:"
          ls -la "${{ github.workspace }}/${{ steps.search.outputs.results-dir }}"
          echo "--- summary.json ---"
          cat "${{ github.workspace }}/${{ steps.search.outputs.results-dir }}/summary.json"

      - name: Upload scraped content as artifact
        uses: actions/upload-artifact@v4
        with:
          name: search-results
          path: search-results/
